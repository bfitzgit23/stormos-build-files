name: Build StormOS ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm archiso git

      - name: Build ISO
        run: |
          cd install-stormos-xfce
          ./build.sh -v

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: stormos-iso
          path: install-stormos-xfce/out/*.iso
          retention-days: 7

      - name: Upload SHA256
        run: |
          cd install-stormos-xfce/out
          sha256sum *.iso > SHA256SUMS
          cat SHA256SUMS

      - name: Comment build result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Build completed! Artifact available in the Actions tab.'
            })
