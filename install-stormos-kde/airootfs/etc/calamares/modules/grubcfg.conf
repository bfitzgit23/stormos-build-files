# GRUB configuration for StormOS
# Updated to ensure proper boot into installed system

overwrite: false
prefer_grub_d: false
keep_distributor: false

defaults:
    # Boot timeout in seconds
    GRUB_TIMEOUT: 5
    
    # Boot from saved entry (last selected option)
    GRUB_DEFAULT: "saved"
    
    # Don't create recovery entries
    GRUB_DISABLE_RECOVERY: true
    
    # Enable OS prober to detect other operating systems
    GRUB_DISABLE_OS_PROBER: "false"
    
    # Use console output (no graphical terminal)
    GRUB_TERMINAL_OUTPUT: "console"
    
    # Kernel parameters for all boot entries
    GRUB_CMDLINE_LINUX_DEFAULT: "quiet splash loglevel=3 nowatchdog"
    
    # Enable background image
    GRUB_BACKGROUND: "/boot/grub/themes/stormos/background.png"
    
    # Set as default entry (StormOS)
    # This ensures the system boots to StormOS by default
    # after installation, not back to live session
    GRUB_SAVEDEFAULT: "true"
