---
# Bootloader configuration for StormOS
# Ensures proper booting into the installed system after reboot

efiBootLoader: "grub"
kernelSearchPath: "/usr/lib/modules"
kernelPattern: "^vmlinuz.*"

# Bootloader entry settings
loaderEntries:
  - "timeout 5"
  - "console-mode keep"

# Kernel parameters for the installed system
kernelParams: [ "quiet", "nowatchdog", "loglevel=3", "nvme_load=yes", "splash", "nvidia-drm.modeset=1", "systemd.unified_cgroup_hierarchy=1" ]

# GRUB installation settings
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"
installEFIFallback: true

# Feature settings
writeSystemdBoot: false
ensureRemovable: false
skipIfNo EFI: false
